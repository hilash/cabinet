<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posts Editor — Cabinet Carousel Factory</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAF6F1;--bg-alt:#F3EDE4;--white:#FFFFFF;
  --text:#3B2F2F;--text-secondary:#6B5B4F;--text-muted:#A89888;--text-pale:#D4C8BB;
  --accent:#8B5E3C;--accent-light:#A0714D;--accent-warm:#7A4F30;--accent-bg:#F5E6D3;--accent-bg-subtle:#FAF2EA;
  --border:#E8DDD0;--border-light:#F0E8DD;--border-dark:#D4C4B0;
  --terminal-bg:#2C2520;--terminal-text:#FAF6F1;--terminal-border:rgba(255,255,255,0.06);
  --serif:Georgia,"Times New Roman",serif;
  --sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --mono:"JetBrains Mono","SF Mono",Consolas,monospace;
  --tiktok:#25F4EE;--instagram:#E1306C;--linkedin:#0A66C2;
  --green:#4CAF50;--amber:#FF9800;--red:#E53935;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(59,47,47,0.08);
  --shadow-md:0 4px 12px rgba(59,47,47,0.1);
  --shadow-lg:0 8px 24px rgba(59,47,47,0.12);
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;min-height:100vh}

/* Header */
.header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:16px}
.header-title{font-family:var(--serif);font-size:1.4rem;font-style:italic;color:var(--text)}
.header-badge{font-family:var(--mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);background:var(--accent-bg-subtle);padding:3px 10px;border-radius:20px}
.header-right{display:flex;align-items:center;gap:8px}
.filter-btn{background:none;border:1px solid var(--border);color:var(--text-secondary);font-family:var(--sans);font-size:0.8rem;padding:5px 14px;border-radius:20px;cursor:pointer;transition:all 0.2s}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg-subtle)}
.filter-btn.active{font-weight:600}

/* Stats */
.stats{display:flex;gap:12px;padding:12px 32px;background:var(--bg-alt);border-bottom:1px solid var(--border-light);flex-wrap:wrap}
.stat-chip{display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--text-secondary);padding:4px 12px;background:var(--white);border-radius:20px;border:1px solid var(--border-light)}
.stat-chip .dot{width:6px;height:6px;border-radius:50%}
.stat-chip strong{color:var(--text);font-weight:600}

/* Post list */
.posts{padding:24px 32px;display:flex;flex-direction:column;gap:16px;max-width:1200px;margin:0 auto}

/* Post card */
.post-card{background:var(--white);border:1px solid var(--border-light);border-radius:var(--radius);overflow:hidden;transition:all 0.2s}
.post-card:hover{border-color:var(--border-dark);box-shadow:var(--shadow-md)}

.post-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-light)}
.post-meta{display:flex;align-items:center;gap:12px}
.platform-badge{font-family:var(--mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.12em;padding:3px 10px;border-radius:20px;font-weight:600}
.platform-badge.tiktok{background:rgba(37,244,238,0.1);color:#1a8a86}
.platform-badge.instagram{background:rgba(225,48,108,0.1);color:#a0234f}
.platform-badge.linkedin{background:rgba(10,102,194,0.1);color:#085199}
.post-title{font-family:var(--serif);font-size:1.05rem;font-style:italic;color:var(--text)}
.post-format{font-family:var(--mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted)}
.post-actions{display:flex;align-items:center;gap:8px}
.status-pill{font-family:var(--mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;padding:4px 12px;border-radius:20px;border:none;cursor:pointer;transition:all 0.2s}
.status-pill.idea{background:var(--accent-bg-subtle);color:var(--text-muted)}
.status-pill.scripted{background:rgba(37,244,238,0.1);color:#1a8a86}
.status-pill.designed{background:rgba(139,94,60,0.12);color:var(--accent)}
.status-pill.published{background:rgba(76,175,80,0.1);color:#2e7d32}
.status-pill.filming{background:rgba(255,152,0,0.1);color:#e65100}

/* Slides strip */
.slides-strip{display:flex;gap:8px;padding:16px 20px;overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--border-dark) transparent}
.slides-strip::-webkit-scrollbar{height:4px}
.slides-strip::-webkit-scrollbar-thumb{background:var(--border-dark);border-radius:4px}

.slide{flex-shrink:0;width:160px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-light);transition:all 0.2s;cursor:pointer;position:relative}
.slide:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-md)}

.slide-image{width:160px;height:200px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.slide-image.dark{background:var(--terminal-bg);color:var(--terminal-text)}
.slide-image.warm{background:var(--accent-bg);color:var(--accent-warm)}
.slide-image.light{background:var(--bg-alt);color:var(--text)}
.slide-image.gradient{background:linear-gradient(135deg,var(--terminal-bg) 0%,#4a3728 100%);color:var(--terminal-text)}
.slide-image.brand{background:linear-gradient(180deg,#FAF6F1 0%,var(--accent-bg) 100%);color:var(--text)}

/* Slide content elements */
.slide-content{padding:12px;display:flex;flex-direction:column;justify-content:center;height:100%;text-align:center;gap:6px}
.slide-hook{font-family:var(--serif);font-size:0.85rem;font-weight:700;font-style:italic;line-height:1.2}
.slide-subtext{font-size:0.55rem;opacity:0.7;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.1em}
.slide-body{font-size:0.6rem;line-height:1.4;opacity:0.85}
.slide-number{position:absolute;top:6px;right:8px;font-family:var(--mono);font-size:0.5rem;opacity:0.4;letter-spacing:0.05em}

/* Placeholder graphic elements */
.placeholder-bars{display:flex;flex-direction:column;gap:4px;width:80%;margin:0 auto}
.placeholder-bar{height:4px;border-radius:2px;opacity:0.3}
.placeholder-bar.w100{width:100%}.placeholder-bar.w80{width:80%}.placeholder-bar.w60{width:60%}.placeholder-bar.w40{width:40%}
.placeholder-circle{width:32px;height:32px;border-radius:50%;opacity:0.2;margin:0 auto 8px}
.placeholder-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;width:80%;margin:0 auto}
.placeholder-box{height:24px;border-radius:3px;opacity:0.15}
.placeholder-img{width:70%;height:48px;border-radius:4px;opacity:0.2;margin:0 auto}
.cta-btn-placeholder{display:inline-block;padding:4px 16px;border-radius:12px;font-size:0.55rem;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.1em;opacity:0.9}

/* Post footer */
.post-footer{padding:12px 20px;background:var(--bg-alt);border-top:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.post-prompt{display:flex;align-items:flex-start;gap:8px;flex:1}
.prompt-label{font-family:var(--mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);white-space:nowrap;padding-top:1px}
.prompt-text{font-size:0.75rem;color:var(--text-secondary);line-height:1.4}
.post-date{font-family:var(--mono);font-size:0.6rem;color:var(--text-muted);white-space:nowrap}

/* Empty state */
.empty{text-align:center;padding:64px 32px;color:var(--text-muted)}
.empty-icon{font-size:2rem;margin-bottom:12px;opacity:0.4}
.empty-text{font-family:var(--serif);font-size:1.1rem;font-style:italic}

@media(max-width:768px){
  .header{padding:12px 16px;flex-wrap:wrap;gap:8px}
  .posts{padding:16px}
  .slides-strip{padding:12px 16px}
  .slide{width:130px}
  .slide-image{width:130px;height:165px}
  .post-header{flex-wrap:wrap;gap:8px}
  .post-footer{flex-wrap:wrap;gap:8px}
}
</style>
</head>

    case "light": return { bg: "var(--bg-alt)", text: "var(--text)", bar: "var(--border-dark)", circle: "var(--border-dark)", box: "var(--border-dark)", cta_bg: "var(--accent)", cta_text: "white" };
    case "gradient": return { bg: "linear-gradient(135deg,var(--terminal-bg) 0%,#4a3728 100%)", text: "var(--terminal-text)", bar: "rgba(250,246,241,0.3)", circle: "rgba(250,246,241,0.15)", box: "rgba(250,246,241,0.1)", cta_bg: "var(--accent-bg)", cta_text: "var(--accent-warm)" };
    case "brand": return { bg: "linear-gradient(180deg,#FAF6F1 0%,var(--accent-bg) 100%)", text: "var(--text)", bar: "var(--accent)", circle: "var(--accent)", box: "var(--accent)", cta_bg: "var(--accent)", cta_text: "white" };
    default: return { bg: "var(--white)", text: "var(--text)", bar: "var(--border)", circle: "var(--border)", box: "var(--border)", cta_bg: "var(--accent)", cta_text: "white" };
  }
}

function renderSlide(slide, index, total) {
  const c = getSlideColors(slide.bg);
  const bgStyle = slide.bg === "gradient" || slide.bg === "brand" ? `background:${c.bg}` : `background:${c.bg}`;

  let content = "";

  if (slide.type === "hook") {
    const hookText = (slide.hook || "").replace(/\n/g, "<br>");
    content = `
      <div class="slide-content">
        <div class="slide-hook" style="color:${c.text}">${hookText}</div>
        ${slide.sub ? `<div class="slide-subtext" style="color:${c.text}">${slide.sub}</div>` : ""}
      </div>`;
  } else if (slide.type === "cta") {
    content = `
      <div class="slide-content">
        <div class="placeholder-circle" style="background:${c.circle}"></div>
        <div class="cta-btn-placeholder" style="background:${c.cta_bg};color:${c.cta_text}">${slide.cta || "Learn more"}</div>
        <div class="slide-subtext" style="color:${c.text};margin-top:8px">link in bio</div>
      </div>`;
  } else if (slide.type === "comparison-a" || slide.type === "comparison-b" || slide.type === "before") {
    content = `
      <div class="slide-content">
        <div class="placeholder-img" style="background:${c.bar}"></div>
        <div class="slide-body" style="color:${c.text};margin-top:8px">${slide.text || ""}</div>
        <div class="placeholder-bars" style="margin-top:8px">
          <div class="placeholder-bar w80" style="background:${c.bar}"></div>
          <div class="placeholder-bar w60" style="background:${c.bar}"></div>
        </div>
      </div>`;
  } else if (slide.type === "reveal") {
    content = `
      <div class="slide-content">
        <div class="slide-hook" style="color:${c.text};font-size:0.75rem">${slide.text || ""}</div>
        <div class="placeholder-grid" style="margin-top:8px">
          <div class="placeholder-box" style="background:${c.box}"></div>
          <div class="placeholder-box" style="background:${c.box}"></div>
          <div class="placeholder-box" style="background:${c.box}"></div>
          <div class="placeholder-box" style="background:${c.box}"></div>
        </div>
      </div>`;
  } else if (slide.type === "evidence") {
    content = `
      <div class="slide-content">
        <div class="slide-hook" style="color:${c.text};font-size:0.7rem">${slide.text || ""}</div>
        <div style="margin-top:10px;width:60px;height:2px;background:${c.bar};opacity:0.5;border-radius:1px;margin-left:auto;margin-right:auto"></div>
      </div>`;
  } else {
    content = `
      <div class="slide-content">
        <div class="slide-body" style="color:${c.text}">${slide.text || ""}</div>
        <div class="placeholder-bars" style="margin-top:10px">
          <div class="placeholder-bar w100" style="background:${c.bar}"></div>
          <div class="placeholder-bar w80" style="background:${c.bar}"></div>
          <div class="placeholder-bar w40" style="background:${c.bar}"></div>
        </div>
      </div>`;
  }

  return `
    <div class="slide">
      <div class="slide-image" style="${bgStyle}">
        <div class="slide-number" style="color:${c.text}">${index + 1}/${total}</div>
        ${content}
      </div>
    </div>`;
}

function renderPost(post) {
  const slidesHtml = post.slides.map((s, i) => renderSlide(s, i, post.slides.length)).join("");

  return `
    <div class="post-card" data-platform="${post.platform}" data-status="${post.status}">
      <div class="post-header">
        <div class="post-meta">
          <span class="platform-badge ${post.platform}">${post.platform}</span>
          <span class="post-title">${post.title}</span>
          <span class="post-format">${post.format} &middot; ${post.slides.length} slides</span>
        </div>
        <div class="post-actions">
          <span class="status-pill ${post.status}">${post.status}</span>
        </div>
      </div>
      <div class="slides-strip">${slidesHtml}</div>
      <div class="post-footer">
        <div class="post-prompt">
          <span class="prompt-label">Prompt</span>
          <span class="prompt-text">${post.prompt}</span>
        </div>
        <span class="post-date">${post.date}</span>
      </div>
    </div>`;
}

function renderStats() {
  const filtered = getFilteredPosts();
  const platforms = { tiktok: 0, instagram: 0, linkedin: 0 };
  const statuses = { idea: 0, scripted: 0, designed: 0, published: 0 };
  filtered.forEach(p => {
    platforms[p.platform]++;
    statuses[p.status] = (statuses[p.status] || 0) + 1;
  });

  document.getElementById("statsBar").innerHTML = `
    <div class="stat-chip"><div class="dot" style="background:var(--tiktok)"></div>TikTok <strong>${platforms.tiktok}</strong></div>
    <div class="stat-chip"><div class="dot" style="background:var(--instagram)"></div>Instagram <strong>${platforms.instagram}</strong></div>
    <div class="stat-chip"><div class="dot" style="background:var(--linkedin)"></div>LinkedIn <strong>${platforms.linkedin}</strong></div>
    <span style="width:1px;height:16px;background:var(--border)"></span>
    <div class="stat-chip"><div class="dot" style="background:var(--green)"></div>Published <strong>${statuses.published || 0}</strong></div>
    <div class="stat-chip"><div class="dot" style="background:var(--accent)"></div>Designed <strong>${statuses.designed || 0}</strong></div>
    <div class="stat-chip"><div class="dot" style="background:var(--tiktok)"></div>Scripted <strong>${statuses.scripted || 0}</strong></div>
    <div class="stat-chip"><div class="dot" style="background:var(--text-pale)"></div>Idea <strong>${statuses.idea || 0}</strong></div>
    <span style="width:1px;height:16px;background:var(--border)"></span>
    <div class="stat-chip">Total <strong>${filtered.length}</strong> posts &middot; <strong>${filtered.reduce((s,p) => s + p.slides.length, 0)}</strong> slides</div>
  `;
}

function getFilteredPosts() {
  return posts.filter(p => {
    if (activeFilter !== "all" && p.platform !== activeFilter) return false;
    if (activeStatus !== "all" && p.status !== activeStatus) return false;
    return true;
  });
}

function render() {
  const filtered = getFilteredPosts();
  const container = document.getElementById("postsContainer");

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">&#9744;</div><div class="empty-text">No posts match this filter</div></div>`;
  } else {
    container.innerHTML = filtered.map(renderPost).join("");
  }
  renderStats();
}

// Filter buttons
document.querySelectorAll(".filter-btn[data-filter]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn[data-filter]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    render();
  });
});
document.querySelectorAll(".filter-btn[data-status]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn[data-status]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeStatus = btn.dataset.status;
    render();
  });
});

render();
</script>
</body>
</html>
