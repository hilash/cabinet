<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Calendar — Cabinet Carousel Factory</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAF6F1;--bg-alt:#F3EDE4;--white:#FFFFFF;
  --text:#3B2F2F;--text-secondary:#6B5B4F;--text-muted:#A89888;--text-pale:#D4C8BB;
  --accent:#8B5E3C;--accent-light:#A0714D;--accent-warm:#7A4F30;--accent-bg:#F5E6D3;--accent-bg-subtle:#FAF2EA;
  --border:#E8DDD0;--border-light:#F0E8DD;--border-dark:#D4C4B0;
  --terminal-bg:#2C2520;--terminal-border:rgba(255,255,255,0.06);
  --serif:Georgia,"Times New Roman",serif;
  --sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --mono:"JetBrains Mono","SF Mono",Consolas,monospace;
  --tiktok:#25F4EE;--instagram:#E1306C;--linkedin:#0A66C2;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(59,47,47,0.08);
  --shadow-md:0 4px 12px rgba(59,47,47,0.1);
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;overflow-x:hidden;min-height:100vh}

/* Header */
.header{background:var(--white);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:16px}
.header-title{font-family:var(--serif);font-size:1.5rem;font-style:italic;color:var(--text)}
.header-subtitle{font-family:var(--mono);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);background:var(--accent-bg-subtle);padding:3px 10px;border-radius:20px}
.nav-buttons{display:flex;align-items:center;gap:8px}
.nav-btn{background:none;border:1px solid var(--border);color:var(--text-secondary);font-family:var(--sans);font-size:0.85rem;padding:6px 16px;border-radius:20px;cursor:pointer;transition:all 0.2s}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg-subtle)}
.month-label{font-family:var(--serif);font-size:1.1rem;font-style:italic;color:var(--text);min-width:160px;text-align:center}

/* Stats bar */
.stats-bar{display:flex;gap:16px;padding:16px 32px;background:var(--bg-alt);border-bottom:1px solid var(--border-light);flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--white);border-radius:var(--radius-sm);border:1px solid var(--border-light);box-shadow:var(--shadow)}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stat-dot.tiktok{background:var(--tiktok)}
.stat-dot.instagram{background:var(--instagram)}
.stat-dot.linkedin{background:var(--linkedin)}
.stat-dot.total{background:var(--accent)}
.stat-label{font-family:var(--mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted)}
.stat-value{font-size:0.85rem;font-weight:600;color:var(--text)}

/* Calendar grid */
.calendar{padding:24px 32px 32px}
.day-headers{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.day-header{font-family:var(--mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);text-align:center;padding:8px 0}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day-cell{background:var(--white);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:8px;min-height:120px;transition:all 0.2s;position:relative}
.day-cell:hover{border-color:var(--border-dark);box-shadow:var(--shadow-md)}
.day-cell.today{border-color:var(--accent);border-width:2px}
.day-cell.other-month{background:var(--bg-alt);opacity:0.5}
.day-number{font-family:var(--mono);font-size:0.7rem;color:var(--text-muted);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.day-cell.today .day-number{color:var(--accent);font-weight:600}
.today-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}

/* Carousel cards */
.carousel-card{font-size:0.65rem;padding:4px 6px;border-radius:4px;margin-bottom:3px;cursor:pointer;transition:all 0.2s;border-left:3px solid;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.carousel-card:hover{transform:translateX(2px);box-shadow:var(--shadow)}
.carousel-card.tiktok{background:rgba(37,244,238,0.08);border-left-color:var(--tiktok);color:#1a8a86}
.carousel-card.instagram{background:rgba(225,48,108,0.08);border-left-color:var(--instagram);color:#a0234f}
.carousel-card.linkedin{background:rgba(10,102,194,0.08);border-left-color:var(--linkedin);color:#085199}

/* Status badges */
.status{font-family:var(--mono);font-size:0.5rem;text-transform:uppercase;letter-spacing:0.08em;padding:1px 4px;border-radius:3px;display:inline-block;margin-top:2px}
.status.idea{background:var(--accent-bg-subtle);color:var(--text-muted)}
.status.scripted{background:rgba(37,244,238,0.1);color:#1a8a86}
.status.designed{background:rgba(139,94,60,0.12);color:var(--accent)}
.status.published{background:rgba(76,175,80,0.1);color:#2e7d32}
.status.filming{background:rgba(255,152,0,0.1);color:#e65100}

/* Legend */
.legend{display:flex;gap:20px;padding:16px 32px;border-top:1px solid var(--border-light);background:var(--bg-alt)}
.legend-item{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted)}
.legend-dot{width:10px;height:3px;border-radius:2px}

/* Tooltip */
.tooltip{display:none;position:absolute;z-index:200;background:var(--terminal-bg);color:#FAF6F1;padding:12px 16px;border-radius:var(--radius-sm);font-size:0.75rem;min-width:200px;box-shadow:0 8px 24px rgba(44,37,32,0.25);border:1px solid var(--terminal-border);pointer-events:none}
.tooltip.visible{display:block}
.tooltip-title{font-weight:600;margin-bottom:4px;font-size:0.8rem}
.tooltip-meta{font-family:var(--mono);font-size:0.6rem;color:var(--text-pale);text-transform:uppercase;letter-spacing:0.1em}
.tooltip-desc{color:#D4C8BB;margin-top:6px;line-height:1.4}

@media(max-width:768px){
  .calendar-grid,.day-headers{grid-template-columns:repeat(7,1fr)}
  .day-cell{min-height:80px;padding:4px}
  .carousel-card{font-size:0.55rem;padding:2px 4px}
  .header{padding:12px 16px;flex-wrap:wrap;gap:8px}
  .calendar{padding:12px 8px}
  .stats-bar{padding:8px 16px;gap:8px}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="header-title">Content Calendar</div>
    <span class="header-subtitle">carousel factory</span>
  </div>
  <div class="nav-buttons">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8592; Prev</button>
    <span class="month-label" id="monthLabel">April 2026</span>
    <button class="nav-btn" onclick="changeMonth(1)">Next &#8594;</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><span class="stat-dot tiktok"></span><div><div class="stat-label">TikTok</div><div class="stat-value" id="statTiktok">0</div></div></div>
  <div class="stat"><span class="stat-dot instagram"></span><div><div class="stat-label">Instagram</div><div class="stat-value" id="statInstagram">0</div></div></div>
  <div class="stat"><span class="stat-dot linkedin"></span><div><div class="stat-label">LinkedIn</div><div class="stat-value" id="statLinkedin">0</div></div></div>
  <div class="stat"><span class="stat-dot total"></span><div><div class="stat-label">Total</div><div class="stat-value" id="statTotal">0</div></div></div>
</div>

<div class="calendar">
  <div class="day-headers">
    <div class="day-header">Sun</div><div class="day-header">Mon</div><div class="day-header">Tue</div>
    <div class="day-header">Wed</div><div class="day-header">Thu</div><div class="day-header">Fri</div><div class="day-header">Sat</div>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--tiktok)"></div>TikTok</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--instagram)"></div>Instagram</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--linkedin)"></div>LinkedIn</div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="tooltipTitle"></div>
  <div class="tooltip-meta" id="tooltipMeta"></div>
  <div class="tooltip-desc" id="tooltipDesc"></div>
</div>

<script>
const carousels = [
  {day:1,platform:"tiktok",title:"Stop using Notion",status:"published",format:"Hot Take",slides:5,desc:"Contrarian opener — Notion has no local files for AI agents"},
  {day:1,platform:"linkedin",title:"Why your KB needs a terminal",status:"published",format:"Educational",slides:7,desc:"Show Cabinet web terminal running Claude Code"},
  {day:3,platform:"tiktok",title:"0 databases. 100% yours.",status:"published",format:"Comparison",slides:6,desc:"Privacy/ownership angle — file-based vs cloud"},
  {day:3,platform:"instagram",title:"I replaced 5 tools with markdown",status:"published",format:"Product Demo",slides:8,desc:"Before/after workflow — show the actual Cabinet UI"},
  {day:5,platform:"tiktok",title:"Your docs are dead weight",status:"published",format:"Hot Take",slides:5,desc:"Reframe docs as living AI-readable knowledge"},
  {day:5,platform:"instagram",title:"Cabinet vs Notion vs Obsidian",status:"published",format:"Comparison",slides:10,desc:"Fair comparison using competitors.csv data"},
  {day:7,platform:"tiktok",title:"AI agents with amnesia",status:"published",format:"Hot Take",slides:5,desc:"Without shared memory (KB) agents are useless"},
  {day:7,platform:"linkedin",title:"How I run my startup from files",status:"published",format:"Storytime",slides:7,desc:"Founder credibility — show the data/ directory"},
  {day:8,platform:"instagram",title:"5 things I automated this week",status:"published",format:"Listicle",slides:8,desc:"Real agent sessions: briefing + competitor scan"},
  {day:9,platform:"tiktok",title:"Your KB should have apps inside it",status:"published",format:"Product Demo",slides:6,desc:"Show embedded HTML apps running in the KB"},
  {day:10,platform:"tiktok",title:"Carousel factory behind the scenes",status:"designed",format:"Behind the Scenes",slides:6,desc:"Meta — show Cabinet being used to make this content"},
  {day:10,platform:"instagram",title:"Git-backed version history",status:"scripted",format:"Educational",slides:7,desc:"Show the diff viewer and restore flow"},
  {day:11,platform:"linkedin",title:"Why we chose files over databases",status:"scripted",format:"Educational",slides:8,desc:"Technical decision — appeal to engineering founders"},
  {day:12,platform:"tiktok",title:"Drag-and-drop your startup brain",status:"designed",format:"Product Demo",slides:5,desc:"Sidebar reordering + page organization"},
  {day:14,platform:"tiktok",title:"Wiki-links changed how I think",status:"scripted",format:"Storytime",slides:6,desc:"Show wiki-link feature connecting pages"},
  {day:14,platform:"instagram",title:"The agent dashboard walkthrough",status:"idea",format:"Tutorial",slides:9,desc:"Full walkthrough of running AI agents"},
  {day:15,platform:"tiktok",title:"CSV files as interactive tables",status:"idea",format:"Product Demo",slides:5,desc:"Show CSV rendering in the sidebar"},
  {day:16,platform:"instagram",title:"Cron jobs for your knowledge",status:"idea",format:"Educational",slides:7,desc:"Scheduled jobs — competitor scan daily example"},
  {day:17,platform:"tiktok",title:"Dark mode everything",status:"idea",format:"Behind the Scenes",slides:5,desc:"Quick visual showcase of dark/light theme"},
  {day:17,platform:"linkedin",title:"Self-hosted vs cloud KB comparison",status:"idea",format:"Comparison",slides:8,desc:"Use competitor data — privacy and control angle"},
  {day:19,platform:"tiktok",title:"Cmd+K search is addictive",status:"idea",format:"Product Demo",slides:5,desc:"Full-text search across all pages"},
  {day:21,platform:"tiktok",title:"Embed any website in your KB",status:"idea",format:"Tutorial",slides:6,desc:"Show .app marker and iframe embedding"},
  {day:21,platform:"instagram",title:"The complete Cabinet setup guide",status:"idea",format:"Educational",slides:10,desc:"Step-by-step from install to first agent run"},
  {day:22,platform:"linkedin",title:"AI agents need shared memory",status:"idea",format:"Thought Leadership",slides:7,desc:"The core thesis — KB as shared context layer"},
  {day:24,platform:"tiktok",title:"My posting schedule (steal it)",status:"idea",format:"Listicle",slides:6,desc:"Share the actual posting schedule from this factory"},
  {day:26,platform:"instagram",title:"Every feature in 60 seconds",status:"idea",format:"Product Demo",slides:10,desc:"Rapid-fire feature showcase carousel"},
  {day:28,platform:"tiktok",title:"Why I open-sourced my brain",status:"idea",format:"Storytime",slides:5,desc:"Philosophy behind file-based knowledge"},
  {day:28,platform:"linkedin",title:"Month 1 content results",status:"idea",format:"Data-Driven",slides:8,desc:"Share real performance numbers from April"},
  {day:30,platform:"instagram",title:"May content plan preview",status:"idea",format:"Behind the Scenes",slides:6,desc:"Tease next month's carousel topics"},
];

let currentYear = 2026, currentMonth = 3; // April (0-indexed)

function getDaysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function getFirstDayOfWeek(y,m){return new Date(y,m,1).getDay()}

function renderCalendar(){
  const grid = document.getElementById("calendarGrid");
  grid.innerHTML = "";
  const daysInMonth = getDaysInMonth(currentYear,currentMonth);
  const firstDay = getFirstDayOfWeek(currentYear,currentMonth);
  const prevDays = getDaysInMonth(currentYear,currentMonth-1);
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  document.getElementById("monthLabel").textContent = months[currentMonth]+" "+currentYear;

  const today = currentYear===2026 && currentMonth===3 ? 10 : -1;
  let counts = {tiktok:0,instagram:0,linkedin:0};

  // Previous month padding
  for(let i=firstDay-1;i>=0;i--){
    const cell = document.createElement("div");
    cell.className = "day-cell other-month";
    cell.innerHTML = `<div class="day-number">${prevDays-i}</div>`;
    grid.appendChild(cell);
  }

  // Current month
  for(let d=1;d<=daysInMonth;d++){
    const cell = document.createElement("div");
    cell.className = "day-cell"+(d===today?" today":"");
    let numHtml = `<div class="day-number">${d}${d===today?'<span class="today-dot"></span>':''}</div>`;
    const dayCarousels = carousels.filter(c=>c.day===d);
    let cardsHtml = "";
    dayCarousels.forEach(c=>{
      counts[c.platform]++;
      cardsHtml += `<div class="carousel-card ${c.platform}" data-title="${c.title}" data-format="${c.format}" data-slides="${c.slides}" data-status="${c.status}" data-desc="${c.desc}" data-platform="${c.platform}" onmouseenter="showTooltip(event,this)" onmouseleave="hideTooltip()">${c.title}<div class="status ${c.status}">${c.status}</div></div>`;
    });
    cell.innerHTML = numHtml + cardsHtml;
    grid.appendChild(cell);
  }

  // Next month padding
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for(let i=1;i<=remaining;i++){
    const cell = document.createElement("div");
    cell.className = "day-cell other-month";
    cell.innerHTML = `<div class="day-number">${i}</div>`;
    grid.appendChild(cell);
  }

  document.getElementById("statTiktok").textContent = counts.tiktok;
  document.getElementById("statInstagram").textContent = counts.instagram;
  document.getElementById("statLinkedin").textContent = counts.linkedin;
  document.getElementById("statTotal").textContent = counts.tiktok+counts.instagram+counts.linkedin;
}

function changeMonth(delta){
  currentMonth += delta;
  if(currentMonth>11){currentMonth=0;currentYear++}
  if(currentMonth<0){currentMonth=11;currentYear--}
  renderCalendar();
}

function showTooltip(e,el){
  const tt = document.getElementById("tooltip");
  const platform = el.dataset.platform;
  const platformLabel = platform.charAt(0).toUpperCase()+platform.slice(1);
  document.getElementById("tooltipTitle").textContent = el.dataset.title;
  document.getElementById("tooltipMeta").textContent = `${platformLabel} · ${el.dataset.format} · ${el.dataset.slides} slides · ${el.dataset.status}`;
  document.getElementById("tooltipDesc").textContent = el.dataset.desc;
  tt.classList.add("visible");
  const rect = el.getBoundingClientRect();
  tt.style.left = Math.min(rect.left, window.innerWidth-220)+"px";
  tt.style.top = (rect.bottom+8)+"px";
  tt.style.position = "fixed";
}
function hideTooltip(){document.getElementById("tooltip").classList.remove("visible")}

renderCalendar();
</script>
</body>
</html>
