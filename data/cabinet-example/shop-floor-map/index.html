<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Floor Map — 93 Diagon Alley</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0a1a;
    --surface: rgba(30, 20, 50, 0.7);
    --border: rgba(255,255,255,0.06);
    --text: #e2dff0;
    --text-muted: #9a8cb8;
    --text-dim: #7c6f9b;
    --purple: #c084fc;
    --candy: #ec4899;
    --prank: #f97316;
    --checkout: #10b981;
    --rdlab: #7c3aed;
    --display: #06b6d4;
    --storage: #6366f1;
    --green: #4ade80;
    --amber: #facc15;
    --red: #f87171;
    --panel-width: 360px;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  .app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(15, 10, 26, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  .header-left h1 {
    font-size: 1.25rem;
    font-weight: 800;
    color: #f0e6ff;
    letter-spacing: -0.03em;
  }

  .header-left h1 .accent {
    background: linear-gradient(135deg, var(--purple), #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-left .subtitle {
    font-size: 0.7rem;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .store-status {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 8px;
    background: rgba(74, 222, 128, 0.08);
    border: 1px solid rgba(74, 222, 128, 0.2);
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--green);
  }

  .store-status .pulse-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: gentle-pulse 2s ease-in-out infinite;
  }

  /* ── Zone Selector (breadcrumbs) ── */
  .zone-selector {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(15, 10, 26, 0.5);
    overflow-x: auto;
    flex-shrink: 0;
  }

  .zone-selector::-webkit-scrollbar { display: none; }

  .zone-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    font-family: inherit;
  }

  .zone-btn:hover {
    background: rgba(255,255,255,0.04);
    color: var(--text);
  }

  .zone-btn:focus-visible {
    outline: 2px solid var(--purple);
    outline-offset: 2px;
  }

  .zone-btn.active {
    background: rgba(192, 132, 252, 0.1);
    border-color: rgba(192, 132, 252, 0.25);
    color: var(--purple);
  }

  .zone-btn .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .flow-toggle {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 0.7rem;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .flow-toggle:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .flow-toggle:focus-visible { outline: 2px solid var(--purple); outline-offset: 2px; }
  .flow-toggle.active { border-color: rgba(192, 132, 252, 0.3); color: var(--purple); }

  /* ── Main Content Area ── */
  .main-content {
    display: flex;
    flex: 1;
    min-height: 0;
    position: relative;
  }

  .map-area {
    flex: 1;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
  }

  .floor-wrapper {
    position: relative;
    width: 100%;
    max-width: 780px;
  }

  .floor-svg {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 4px 24px rgba(88, 28, 135, 0.15));
  }

  /* ── SVG Zone Styles ── */
  .zone-group {
    cursor: pointer;
    outline: none;
  }

  .zone-group:focus-visible .zone-bg {
    stroke-width: 3;
    stroke-opacity: 1;
  }

  .zone-group:focus-visible {
    filter: brightness(1.2);
  }

  .zone-bg {
    transition: all 0.25s ease;
  }

  .zone-group:hover .zone-bg,
  .zone-group.selected .zone-bg {
    stroke-opacity: 0.9;
    stroke-width: 2.5;
    filter: brightness(1.15);
  }

  .zone-group.selected .zone-bg {
    stroke-width: 2.5;
    stroke-dasharray: none;
  }

  .zone-label {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    fill: #fff;
    pointer-events: none;
  }

  .zone-sublabel {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    fill: rgba(255,255,255,0.5);
    pointer-events: none;
    letter-spacing: 0.08em;
  }

  .zone-icon {
    pointer-events: none;
    opacity: 0.35;
  }

  .zone-metric {
    pointer-events: none;
  }

  .zone-metric-bg {
    fill: rgba(0,0,0,0.5);
    rx: 4;
  }

  .zone-metric-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    fill: rgba(255,255,255,0.8);
    font-weight: 500;
  }

  /* Status indicator dots */
  .status-indicator {
    pointer-events: none;
  }

  .status-ring {
    animation: status-pulse 2.5s ease-in-out infinite;
  }

  @keyframes status-pulse {
    0%, 100% { opacity: 0.3; r: 8; }
    50% { opacity: 0.6; r: 10; }
  }

  @keyframes gentle-pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* R&D Lab glow */
  .rdlab-glow {
    animation: lab-glow 3s ease-in-out infinite;
  }

  @keyframes lab-glow {
    0%, 100% { flood-opacity: 0.15; }
    50% { flood-opacity: 0.35; }
  }

  /* Customer flow path */
  .flow-path {
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .flow-path.visible {
    opacity: 1;
  }

  .flow-dot {
    animation: flow-move 8s linear infinite;
  }

  .flow-dot-2 {
    animation: flow-move 8s linear infinite;
    animation-delay: -2.6s;
  }

  .flow-dot-3 {
    animation: flow-move 8s linear infinite;
    animation-delay: -5.3s;
  }

  @keyframes flow-move {
    0% { offset-distance: 0%; opacity: 0; }
    5% { opacity: 1; }
    95% { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }

  /* Shelf detail lines */
  .shelf-line {
    stroke-opacity: 0.12;
    stroke-width: 1;
  }

  .counter-line {
    stroke-opacity: 0.15;
    stroke-width: 1.5;
    stroke-dasharray: 4,4;
  }

  /* ── Info Panel (slide-in sidebar) ── */
  .info-panel-wrapper {
    width: 0;
    flex-shrink: 0;
    overflow: hidden;
    transition: width 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    border-left: 1px solid transparent;
  }

  .info-panel-wrapper.open {
    width: var(--panel-width);
    border-left-color: var(--border);
  }

  .info-panel {
    width: var(--panel-width);
    height: 100%;
    overflow-y: auto;
    padding: 24px 20px;
    background: rgba(18, 12, 30, 0.95);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
  }

  .info-panel::-webkit-scrollbar { width: 4px; }
  .info-panel::-webkit-scrollbar-track { background: transparent; }
  .info-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .info-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .info-close {
    width: 28px;
    height: 28px;
    border: none;
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .info-close:hover { background: rgba(255,255,255,0.12); color: var(--text); }
  .info-close:focus-visible { outline: 2px solid var(--purple); outline-offset: 2px; }

  .info-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .info-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #f0e6ff;
    margin-bottom: 12px;
  }

  .info-status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .info-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .info-status-dot.green { background: var(--green); box-shadow: 0 0 8px rgba(74, 222, 128, 0.4); }
  .info-status-dot.amber { background: var(--amber); box-shadow: 0 0 8px rgba(250, 204, 21, 0.4); }
  .info-status-dot.red { background: var(--red); box-shadow: 0 0 8px rgba(248, 113, 113, 0.4); }

  .info-status-label {
    font-size: 0.8rem;
    font-weight: 500;
    color: #c4b8de;
  }

  .info-desc {
    font-size: 0.85rem;
    line-height: 1.65;
    color: #b8aed0;
    margin-bottom: 20px;
  }

  .info-section-label {
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .info-products {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 20px;
  }

  .product-tag {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 500;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.07);
    color: #d4cceb;
  }

  /* Metrics grid in panel */
  .info-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .info-metric-card {
    padding: 10px 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
  }

  .info-metric-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
  }

  .info-metric-label {
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Restock button */
  .restock-btn {
    width: 100%;
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid rgba(250, 204, 21, 0.25);
    background: rgba(250, 204, 21, 0.06);
    color: var(--amber);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .restock-btn:hover {
    background: rgba(250, 204, 21, 0.12);
    border-color: rgba(250, 204, 21, 0.4);
  }

  .restock-btn:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

  .restock-btn.flagged {
    border-color: rgba(74, 222, 128, 0.3);
    background: rgba(74, 222, 128, 0.08);
    color: var(--green);
    cursor: default;
  }

  /* ── Legend ── */
  .legend-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 24px;
    border-top: 1px solid var(--border);
    background: rgba(15, 10, 26, 0.5);
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 0.72rem;
    color: var(--text-muted);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
    background: transparent;
    font-family: inherit;
  }

  .legend-item:hover {
    background: rgba(255,255,255,0.04);
    color: var(--text);
  }

  .legend-item:focus-visible { outline: 2px solid var(--purple); outline-offset: 2px; }

  .legend-item.highlighted {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.1);
    color: var(--text);
  }

  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .legend-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-show-all {
    margin-left: auto;
    padding: 4px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 0.68rem;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .legend-show-all:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .legend-show-all:focus-visible { outline: 2px solid var(--purple); outline-offset: 2px; }

  /* ── Responsive: stack panel below on narrow viewports ── */
  @media (max-width: 720px) {
    :root { --panel-width: 100%; }

    .main-content {
      flex-direction: column;
    }

    .info-panel-wrapper {
      width: 100% !important;
      height: 0;
      border-left: none;
      border-top: 1px solid transparent;
      transition: height 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .info-panel-wrapper.open {
      height: 380px;
      border-top-color: var(--border);
    }

    .info-panel {
      width: 100%;
      height: 380px;
    }

    .header { padding: 12px 16px; }
    .zone-selector { padding: 8px 16px; }
    .map-area { padding: 12px; }
    .legend-bar { padding: 8px 16px; }
  }

  /* ── Pulse click animation ── */
  @keyframes zone-click-pulse {
    0% { r: 0; opacity: 0.6; }
    100% { r: 60; opacity: 0; }
  }

  .click-pulse {
    animation: zone-click-pulse 0.6s ease-out forwards;
  }

  /* ── High contrast mode ── */
  @media (forced-colors: active) {
    .zone-bg { stroke-width: 3; }
    .zone-label { fill: CanvasText; }
  }

  /* ── Visually hidden (screen reader only) ── */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header" role="banner">
    <div class="header-left">
      <h1><span class="accent">93 Diagon Alley</span></h1>
      <div class="subtitle">Weasleys' Wizard Wheezes &middot; Floor Management System</div>
    </div>
    <div class="header-right">
      <div class="header-clock" id="clock" aria-live="off"></div>
      <div class="store-status" role="status" aria-label="Store status: All systems operational">
        <div class="pulse-dot"></div>
        All Systems Operational
      </div>
    </div>
  </header>

  <!-- Zone selector breadcrumbs -->
  <nav class="zone-selector" role="navigation" aria-label="Zone quick navigation">
    <button class="zone-btn" data-zone="candy" aria-label="Candy Aisle, status: fully stocked">
      <span class="dot" style="background:var(--green)"></span>Candy Aisle
    </button>
    <button class="zone-btn" data-zone="prank" aria-label="Prank Shelf, status: fully stocked">
      <span class="dot" style="background:var(--green)"></span>Prank Shelf
    </button>
    <button class="zone-btn" data-zone="checkout" aria-label="Checkout Counter, status: open">
      <span class="dot" style="background:var(--green)"></span>Checkout
    </button>
    <button class="zone-btn" data-zone="rdlab" aria-label="R&D Lab, status: caution">
      <span class="dot" style="background:var(--red)"></span>R&D Lab
    </button>
    <button class="zone-btn" data-zone="display" aria-label="Display Window, status: rotation pending">
      <span class="dot" style="background:var(--amber)"></span>Display
    </button>
    <button class="zone-btn" data-zone="storage" aria-label="Storage Room, status: restocking">
      <span class="dot" style="background:var(--amber)"></span>Storage
    </button>
    <button class="flow-toggle" id="flowToggle" aria-pressed="false" aria-label="Toggle customer flow visualization">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      Customer Flow
    </button>
  </nav>

  <!-- Main area: map + slide-in panel -->
  <div class="main-content">
    <div class="map-area">
      <div class="floor-wrapper">
        <svg class="floor-svg" viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Interactive floor plan of Weasleys' Wizard Wheezes shop at 93 Diagon Alley">
          <title>Shop floor plan with 6 interactive zones</title>

          <!-- Defs -->
          <defs>
            <!-- Grid pattern -->
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
              <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.018)" stroke-width="1"/>
            </pattern>

            <!-- Isometric-ish gradient fills for depth -->
            <linearGradient id="grad-candy" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ec4899" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="#ec4899" stop-opacity="0.12"/>
            </linearGradient>
            <linearGradient id="grad-prank" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f97316" stop-opacity="0.28"/>
              <stop offset="100%" stop-color="#f97316" stop-opacity="0.1"/>
            </linearGradient>
            <linearGradient id="grad-checkout" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#10b981" stop-opacity="0.32"/>
              <stop offset="100%" stop-color="#10b981" stop-opacity="0.12"/>
            </linearGradient>
            <linearGradient id="grad-rdlab" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
              <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.12"/>
            </linearGradient>
            <linearGradient id="grad-display" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.28"/>
              <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1"/>
            </linearGradient>
            <linearGradient id="grad-storage" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="#6366f1" stop-opacity="0.1"/>
            </linearGradient>

            <!-- R&D Lab animated glow filter -->
            <filter id="rdlab-glow-filter" x="-20%" y="-20%" width="140%" height="140%">
              <feFlood flood-color="#7c3aed" class="rdlab-glow" flood-opacity="0.2" result="glow"/>
              <feGaussianBlur in="glow" stdDeviation="8" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>

            <!-- Hazard stripe pattern -->
            <pattern id="hazard" width="12" height="6" patternUnits="userSpaceOnUse">
              <rect width="12" height="6" fill="#7c3aed" fill-opacity="0.25"/>
              <polygon points="0,6 6,0 12,6" fill="#facc15" fill-opacity="0.3"/>
            </pattern>

            <!-- Customer flow path -->

    description: 'The first thing every witch and wizard sees when they walk down Diagon Alley! Our enchanted window displays rotate through the latest and greatest. Currently featuring the new Wildfire Whiz-Bangs collection -- guaranteed to outdo last year\'s.',

const metricLabels = {
  candy:    { units: 'Units', revenue: 'Revenue', avgBasket: 'Avg Basket', visitors: 'Visitors' },
  prank:    { units: 'Units', revenue: 'Revenue', avgBasket: 'Avg Basket', visitors: 'Visitors' },
  checkout: { orders: 'Orders', revenue: 'Revenue', avgWait: 'Avg Wait', registers: 'Registers' },
  rdlab:    { experiments: 'Active Exp.', prototypes: 'Prototypes', incidents: 'Incidents', breakthroughs: 'Breakthroughs' },
  display:  { featured: 'Featured', footfall: 'Foot Traffic', conversion: 'Conversion', nextRotation: 'Next Rotation' },
  storage:  { capacity: 'Capacity', crates: 'Crates', incoming: 'Incoming', pendingShip: 'Pending Ship' }
};

// ── State ──
let activeZone = null;
let highlightedLegend = null;
let flowVisible = false;
const flaggedZones = new Set();

// ── DOM refs ──
const panelWrapper = document.getElementById('panelWrapper');
const srAnnounce = document.getElementById('srAnnounce');
const flowPath = document.getElementById('flowPath');
const flowToggle = document.getElementById('flowToggle');
const legendShowAll = document.getElementById('legendShowAll');

// ── Clock ──
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
updateClock();
setInterval(updateClock, 1000);

// ── Select Zone ──
function selectZone(zoneId) {
  if (!zones[zoneId]) return;
  const zone = zones[zoneId];

  // Deselect previous
  document.querySelectorAll('.zone-group.selected').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.zone-btn.active').forEach(el => el.classList.remove('active'));

  // Select new
  activeZone = zoneId;
  const svgZone = document.querySelector(`.zone-group[data-zone="${zoneId}"]`);
  if (svgZone) {
    svgZone.classList.add('selected');
    firePulse(svgZone);
  }

  // Update breadcrumb
  document.querySelectorAll(`.zone-btn[data-zone="${zoneId}"]`).forEach(b => b.classList.add('active'));

  // Populate panel
  const badge = document.getElementById('infoBadge');
  badge.textContent = zone.badge;
  badge.style.background = zone.color + '18';
  badge.style.color = zone.color;

  document.getElementById('infoTitle').textContent = zone.name;
  document.getElementById('infoDesc').textContent = zone.description;

  const dot = document.getElementById('infoStatusDot');
  dot.className = 'info-status-dot ' + zone.statusColor;
  document.getElementById('infoStatusLabel').textContent = zone.status + ' \u00b7 Foot Traffic: ' + zone.traffic;

  // Products
  const productsEl = document.getElementById('infoProducts');
  productsEl.innerHTML = zone.products.map(p => '<span class="product-tag">' + p + '</span>').join('');

  // Metrics
  const metricsEl = document.getElementById('infoMetrics');
  const labels = metricLabels[zoneId];
  metricsEl.innerHTML = Object.entries(zone.metrics).map(([key, val]) =>
    '<div class="info-metric-card"><div class="info-metric-value">' + val + '</div><div class="info-metric-label">' + (labels[key] || key) + '</div></div>'
  ).join('');

  // Restock button
  const btn = document.getElementById('restockBtn');
  if (flaggedZones.has(zoneId)) {
    btn.classList.add('flagged');
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Flagged for Restocking';
  } else {
    btn.classList.remove('flagged');
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg> Flag for Restocking';
  }

  // Open panel
  panelWrapper.classList.add('open');

  // Announce to screen reader
  announce(zone.name + '. ' + zone.status + '. Foot traffic: ' + zone.traffic);
}

function closePanel() {
  panelWrapper.classList.remove('open');
  document.querySelectorAll('.zone-group.selected').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.zone-btn.active').forEach(el => el.classList.remove('active'));
  activeZone = null;
}

// ── Click Pulse Animation ──
function firePulse(svgZone) {
  const bg = svgZone.querySelector('.zone-bg');
  if (!bg) return;
  const bbox = bg.getBBox();
  const cx = bbox.x + bbox.width / 2;
  const cy = bbox.y + bbox.height / 2;
  const container = document.getElementById('pulseContainer');
  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('cx', cx);
  circle.setAttribute('cy', cy);
  circle.setAttribute('r', '0');
  circle.setAttribute('fill', 'none');
  circle.setAttribute('stroke', zones[svgZone.dataset.zone]?.color || '#c084fc');
  circle.setAttribute('stroke-width', '2');
  circle.setAttribute('opacity', '0.5');
  circle.classList.add('click-pulse');
  container.appendChild(circle);
  setTimeout(() => circle.remove(), 700);
}

// ── Screen Reader Announcements ──
function announce(text) {
  srAnnounce.textContent = '';
  requestAnimationFrame(() => { srAnnounce.textContent = text; });
}

// ── SVG Zone Click/Keyboard Handlers ──
document.querySelectorAll('.zone-group').forEach(g => {
  g.addEventListener('click', () => selectZone(g.dataset.zone));
  g.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      selectZone(g.dataset.zone);
    }
  });
});

// Arrow key navigation between zones
const zoneOrder = ['rdlab', 'storage', 'candy', 'prank', 'display', 'checkout'];
document.querySelectorAll('.zone-group').forEach(g => {
  g.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      const idx = zoneOrder.indexOf(g.dataset.zone);
      const next = zoneOrder[(idx + 1) % zoneOrder.length];
      document.querySelector(`.zone-group[data-zone="${next}"]`)?.focus();
    }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      const idx = zoneOrder.indexOf(g.dataset.zone);
      const prev = zoneOrder[(idx - 1 + zoneOrder.length) % zoneOrder.length];
      document.querySelector(`.zone-group[data-zone="${prev}"]`)?.focus();
    }
  });
});

// ── Zone Selector Buttons ──
document.querySelectorAll('.zone-btn[data-zone]').forEach(btn => {
  btn.addEventListener('click', () => selectZone(btn.dataset.zone));
});

// ── Close Button + Escape ──
document.getElementById('infoClose').addEventListener('click', closePanel);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});

// ── Restock Button ──
document.getElementById('restockBtn').addEventListener('click', () => {
  if (!activeZone || flaggedZones.has(activeZone)) return;
  flaggedZones.add(activeZone);
  const btn = document.getElementById('restockBtn');
  btn.classList.add('flagged');
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Flagged for Restocking';
  announce('Zone flagged for restocking');
});

// ── Customer Flow Toggle ──
flowToggle.addEventListener('click', () => {
  flowVisible = !flowVisible;
  flowPath.classList.toggle('visible', flowVisible);
  flowToggle.classList.toggle('active', flowVisible);
  flowToggle.setAttribute('aria-pressed', flowVisible);
});

// ── Interactive Legend ──
document.querySelectorAll('.legend-item[data-zone]').forEach(item => {
  item.addEventListener('click', () => {
    const zone = item.dataset.zone;
    if (highlightedLegend === zone) {
      // Unhighlight
      highlightedLegend = null;
      item.classList.remove('highlighted');
      document.querySelectorAll('.zone-group').forEach(g => g.style.opacity = '');
    } else {
      // Remove previous highlight
      document.querySelectorAll('.legend-item').forEach(li => li.classList.remove('highlighted'));
      highlightedLegend = zone;
      item.classList.add('highlighted');
      // Dim other zones, brighten this one
      document.querySelectorAll('.zone-group').forEach(g => {
        g.style.opacity = g.dataset.zone === zone ? '1' : '0.25';
      });
    }
  });
});

legendShowAll.addEventListener('click', () => {
  highlightedLegend = null;
  document.querySelectorAll('.legend-item').forEach(li => li.classList.remove('highlighted'));
  document.querySelectorAll('.zone-group').forEach(g => g.style.opacity = '');
});

// ── Live Metric Updates (simulate) ──
function randomDelta(val, range) {
  const num = parseInt(val);
  if (isNaN(num)) return val;
  const delta = Math.floor(Math.random() * range * 2) - range;
  return Math.max(0, num + delta);
}

function updateMetrics() {
  // Candy units
  zones.candy.metrics.units = randomDelta(zones.candy.metrics.units, 2);
  // Prank units
  zones.prank.metrics.units = randomDelta(zones.prank.metrics.units, 1);
  // Checkout orders
  zones.checkout.metrics.orders = randomDelta(zones.checkout.metrics.orders, 1);
  // Display footfall
  zones.display.metrics.footfall = randomDelta(zones.display.metrics.footfall, 3);

  // Update SVG metric badges
  document.querySelectorAll('[data-metric]').forEach(el => {
    const z = el.dataset.metric;
    if (z === 'candy') el.textContent = zones.candy.metrics.units + ' units';
    if (z === 'prank') el.textContent = zones.prank.metrics.units + ' units';
    if (z === 'checkout') el.textContent = zones.checkout.metrics.orders + ' orders today';
    if (z === 'storage') el.textContent = zones.storage.metrics.capacity;
    if (z === 'rdlab') el.textContent = zones.rdlab.metrics.experiments + ' experiments';
  });

  // If panel is open for one of these, update panel too
  if (activeZone && panelWrapper.classList.contains('open')) {
    const labels = metricLabels[activeZone];
    const metricsEl = document.getElementById('infoMetrics');
    metricsEl.innerHTML = Object.entries(zones[activeZone].metrics).map(([key, val]) =>
      '<div class="info-metric-card"><div class="info-metric-value">' + val + '</div><div class="info-metric-label">' + (labels[key] || key) + '</div></div>'
    ).join('');
  }
}

setInterval(updateMetrics, 4000);
</script>
