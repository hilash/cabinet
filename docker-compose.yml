services:
  kb:
    build: .
    restart: unless-stopped
    environment:
      - KB_PASSWORD=${KB_PASSWORD:-}
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    ports:
      - "3000:3000"
      # Daemon WebSocket (agent PTY / terminal); required when using http://localhost:3000 directly.
      # With Caddy on :80, WS is proxied to 3001; this mapping matches that for bare port 3000.
      - "3001:3001"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - kb

volumes:
  caddy_data:
  caddy_config:
